<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTMC – Joueur</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/js/audio.js"></script>
    <script src="/js/player.js" defer></script>
</head>
<body class="screen-player">

<a href="/" class="home-link">← Accueil</a>

<div class="container">
    <div id="screen-join" class="screen active">
        <h1>Tu Te Mets Combien ?</h1>
        <p>Rejoindre une partie</p>
        <label style="font-size: 0.85rem; color: #b5c2b7;">Code de la partie :</label>
        <input type="text" id="room-code-input" placeholder="ABCD" maxlength="4" style="text-transform: uppercase; letter-spacing: 0.3em; text-align: center; font-family: monospace; font-size: 1.4rem;">
        <label style="font-size: 0.85rem; color: #b5c2b7;">Votre prénom :</label>
        <input type="text" id="player-name-input" placeholder="Prénom" onkeydown="if(event.key==='Enter') joinGame()">
        <button onclick="joinGame()">Rejoindre 🎮</button>
        <p id="join-error" style="color: var(--danger); display: none;"></p>
    </div>

    <div id="screen-game" class="screen">
        <div id="player-content"></div>
    </div>
</div>

</body>
</html>
